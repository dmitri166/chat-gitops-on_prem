replicaCount: 3

nodeSelector:
  env: prod

tolerations:
  - key: env
    operator: Equal
    value: prod
    effect: NoSchedule

image:
  repository: k3d-k3d-registry:5000/chat-app
  tag: "1.0.0"
  pullPolicy: Always

service:
  type: LoadBalancer
  port: 80

logs:
  emptyDir: ""
  pvc: chat-logs-prod

terraformManagedService: true