{{- if not .Values.terraformManagedService }}
apiVersion: v1
kind: Service
metadata:
  name: chat-svc
  labels:
    app.kubernetes.io/name: chat
    app.kubernetes.io/managed-by: Helm
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: 5000
    name: http
  - port: 8000
    targetPort: 8000
    name: metrics
  selector:
    app: chat
{{- end }}